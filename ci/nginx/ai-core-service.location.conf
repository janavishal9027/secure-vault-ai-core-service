# nginx location snippet for the ai-core-service.
#
# Dropped into /etc/nginx/snippets/${KUBE_NAMESPACE}/ on the VPS by
# ci/deploy-remote.sh. The host's parent server block includes
# /etc/nginx/snippets/<cluster>/*.location.conf, so this snippet is
# picked up automatically when nginx reloads.
#
# /ai-core/* beats the UI's catch-all "/" via nginx's most-specific
# match, so requests to /ai-core/embed, /ai-core/search, /ai-core/chat,
# /ai-core/rag/answer, /ai-core/tags, /ai-core/recommendations/{id}
# etc. all land here. Traefik (inside the LXD container) then strips
# the /ai-core prefix via its StripPrefix middleware before forwarding
# to the pod, which exposes those routes at the root.
#
# ${LXD_BRIDGE_IP} is substituted at deploy time by ci/deploy.sh — it's
# the IP of the cluster's LXD container on lxdbr0, where Traefik
# listens on :80.
location /ai-core/ {
    proxy_pass         http://${LXD_BRIDGE_IP}:80;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # RAG answer + chat responses involve an LLM round-trip plus a
    # pgvector similarity search. 30-60s is realistic for longer
    # prompts; bump the read timeout so streaming-ish responses don't
    # get cut off at the host proxy.
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;

    # Embedding requests carry the full note body. Default 1M nginx
    # cap is fine for text notes but bump to match notes service's
    # 25M ceiling so a freshly-transcribed long note can be embedded
    # without a 413.
    client_max_body_size 25M;
}
